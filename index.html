<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohio Algebra 1 EOC Simulator</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* === STYLING (CSS) === */
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --border-color: #e2e8f0;
            --desmos-color: #1a237e;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .simulator-container { background-color: var(--card-bg); width: 100%; max-width: 850px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 25px; }
        h1 { color: var(--primary); font-size: 22px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bar { width: 100%; height: 8px; background-color: var(--border-color); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
        .meta-info { display: flex; justify-content: space-between; color: #64748b; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        .question-block { font-size: 1.25rem; line-height: 1.6; margin-bottom: 25px; font-weight: 500; }
        .q-instruction { font-size: 0.85rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; width: fit-content; }
        .msq-option { display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border-color); padding: 14px 18px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .msq-option:hover { background: #f1f5f9; border-color: #94a3b8; }
        .msq-option input { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--primary); }
        .text-entry { font-size: 1.2rem; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; width: 100%; max-width: 300px; }
        .button-group { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 14px 28px; font-size: 1.05rem; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-hint { background: #dcfce7; color: #166534; }
        .btn-desmos { background: #e8eaf6; color: var(--desmos-color); border: 1px solid #c5cae9; }
        .hint-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 1.05rem; line-height: 1.5; }
        .math-hint-style { background: #f0fdf4; border-left: 5px solid #10b981; color: #166534; }
        .desmos-hint-style { background: #f8f9fa; border-left: 5px solid var(--desmos-color); color: var(--desmos-color); }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; line-height: 1.6; }
        .feedback.correct { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .feedback.incorrect { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .report-card { background: #f8fafc; border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-top: 20px; text-align: left;}
    </style>
</head>
<body>

<div class="simulator-container">
    <div class="header">
        <h1>Ohio EOC Algebra 1 Simulator</h1>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="meta-info"><span id="q-counter">Loading...</span><span id="q-type"></span></div>
    
    <div id="interactive-area"></div>
    
    <div class="button-group">
        <button id="submit-btn" class="btn btn-submit" onclick="evaluateAnswer()">Submit Answer</button>
        <button id="hint-btn" class="btn btn-hint" onclick="showHint()">💡 Math Hint</button>
        <button id="desmos-btn" class="btn btn-desmos" onclick="showDesmosHint()">📈 Desmos Guide</button>
        <button id="next-btn" class="btn btn-submit" onclick="nextQuestion()" style="display:none;">Next Question &rarr;</button>
    </div>
    
    <div id="hint-box" class="hint-box math-hint-style"></div>
    <div id="desmos-box" class="hint-box desmos-hint-style"></div>
    <div id="feedback-box" class="feedback"></div>
</div>

<script src="questions.js"></script>

<script>
    // === JAVASCRIPT LOGIC ===

    // 1. State Variables (Declared only once!)
    let sessionData = {}; 
    let score = 0;
    const questionsPerRound = 3; // Set to 3 to match our sample questions
    let questionsAnsweredThisRound = 0;
    let currentQuestion = null;
    let wasLastCorrect = false;

    let studentState = {
        currentStandard: "A-REI.3",
        currentDifficulty: "Medium", 
        answeredQuestions: [],       
        masteryStreak: 0             
    };
    const difficultyTiers = ["Easy", "Medium", "Hard"];

    // 2. DOM Elements
    const area = document.getElementById('interactive-area');
    const feedbackBox = document.getElementById('feedback-box');
    const hintBox = document.getElementById('hint-box');
    const desmosBox = document.getElementById('desmos-box');
    const submitBtn = document.getElementById('submit-btn');
    const hintBtn = document.getElementById('hint-btn');
    const desmosBtn = document.getElementById('desmos-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressFill = document.getElementById('progress-fill');

    // 3. Core Functions
    function renderMath() {
        renderMathInElement(document.body, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "\\(", right: "\\)", display: false}] });
    }

    function startNewRound() {
        sessionData = {}; score = 0; questionsAnsweredThisRound = 0; studentState.answeredQuestions = [];
        nextQuestionLogic();
    }

    function nextQuestionLogic() {
        currentQuestion = getNextQuestion();
        if (currentQuestion) {
            updateProgress();
            loadQuestionUI();
        } else {
            showFinal();
        }
    }

    // 4. The Brain (Adaptive Logic)
    function getNextQuestion() {
        // Look for exact match (Standard + Difficulty)
        let pool = questionBank.filter(q => q.std === studentState.currentStandard && q.difficulty === studentState.currentDifficulty && !studentState.answeredQuestions.includes(q.text));
        
        // Fallback 1: Match Standard only
        if (pool.length === 0) pool = questionBank.filter(q => q.std === studentState.currentStandard && !studentState.answeredQuestions.includes(q.text));
        
        // Fallback 2: Any unused question
        if (pool.length === 0) pool = questionBank.filter(q => !studentState.answeredQuestions.includes(q.text));
        
        if (pool.length === 0) return null; // We are out of questions!

        let nextQ = pool[Math.floor(Math.random() * pool.length)];
        studentState.answeredQuestions.push(nextQ.text);
        return nextQ;
    }

    // 5. UI Rendering
    function loadQuestionUI() {
        document.getElementById('q-counter').innerText = `Question ${questionsAnsweredThisRound + 1} of ${questionsPerRound}`;
        document.getElementById('q-type').innerText = `Standard: ${currentQuestion.std} | Level: ${currentQuestion.difficulty}`;
        
        feedbackBox.style.display = 'none'; hintBox.style.display = 'none'; desmosBox.style.display = 'none';
        submitBtn.style.display = 'block'; hintBtn.style.display = currentQuestion.hint ? 'block' : 'none';
        desmosBtn.style.display = currentQuestion.desmosHint ? 'block' : 'none';
        nextBtn.style.display = 'none';
        
        let html = "";
        if (currentQuestion.type === 'msq') {
            html += `<span class="q-instruction">Multiple Choice</span><div class="question-block">${currentQuestion.text}</div>`;
            currentQuestion.options.forEach((opt, idx) => html += `<label class="msq-option"><input type="radio" name="eoc-opt" id="rad-${idx}"> <span>${opt}</span></label>`);
        } else if (currentQuestion.type === 'sata') {
            html += `<span class="q-instruction">Select All That Apply</span><div class="question-block">${currentQuestion.text}</div>`;
            currentQuestion.options.forEach((opt, idx) => html += `<label class="msq-option"><input type="checkbox" id="chk-${idx}"> <span>${opt}</span></label>`);
        } else if (currentQuestion.type === 'text') {
            html += `<span class="q-instruction">Equation Editor</span><div class="question-block">${currentQuestion.text}</div>`;
            html += `<input type="text" id="text-answer" class="text-entry" placeholder="Type answer..." autocomplete="off">`;
        }

        area.innerHTML = html;
        setTimeout(renderMath, 20);
    }

    function showHint() { hintBox.innerHTML = currentQuestion.hint; hintBox.style.display = 'block'; hintBtn.style.display = 'none'; setTimeout(renderMath, 10); }
    function showDesmosHint() { desmosBox.innerHTML = currentQuestion.desmosHint; desmosBox.style.display = 'block'; desmosBtn.style.display = 'none'; setTimeout(renderMath, 10); }

    // 6. Grading
    function evaluateAnswer() {
        let correct = false;
        if (currentQuestion.type === 'msq') {
            let selected = -1; currentQuestion.options.forEach((_, i) => { if(document.getElementById(`rad-${i}`).checked) selected = i; });
            if (selected === -1) { alert("Select an answer."); return; }
            correct = currentQuestion.correctIndices.includes(selected);
        } else if (currentQuestion.type === 'sata') {
            let selections = []; currentQuestion.options.forEach((_, i) => { if(document.getElementById(`chk-${i}`).checked) selections.push(i); });
            if (selections.length === 0) { alert("Select at least one."); return; }
            correct = (selections.length === currentQuestion.correctIndices.length) && selections.every(v => currentQuestion.correctIndices.includes(v));
        } else if (currentQuestion.type === 'text') {
            let val = document.getElementById('text-answer').value.trim().toLowerCase();
            if (val === "") { alert("Type an answer."); return; }
            correct = val === currentQuestion.correctText.toLowerCase();
        }

        // Tracking Score
        let domName = currentQuestion.std;
        if (!sessionData[domName]) sessionData[domName] = { total: 0, correct: 0 };
        sessionData[domName].total++;
        if (correct) { sessionData[domName].correct++; score++; }

        feedbackBox.className = 'feedback ' + (correct ? 'correct' : 'incorrect');
        feedbackBox.innerHTML = `<strong>${correct ? "✔ Correct" : "✖ Incorrect"}</strong><br><br>${currentQuestion.explanation}`;
        feedbackBox.style.display = 'block'; submitBtn.style.display = 'none'; hintBtn.style.display = 'none'; desmosBtn.style.display = 'none'; nextBtn.style.display = 'block';
        setTimeout(renderMath, 10);
    }

    function nextQuestion() {
        questionsAnsweredThisRound++;
        if (questionsAnsweredThisRound >= questionsPerRound) showFinal();
        else nextQuestionLogic();
    }

    function updateProgress() { progressFill.style.width = `${(questionsAnsweredThisRound / questionsPerRound) * 100}%`; }

    // 7. Results Screen
    function showFinal() {
        let pct = Math.round((score / questionsAnsweredThisRound) * 100);
        area.innerHTML = `<div style="text-align:center;"><h2>Practice Complete!</h2><p>You scored ${score} out of ${questionsAnsweredThisRound} (${pct}%)</p><br><button class="btn btn-submit" onclick="startNewRound()">Start Over</button></div>`;
        submitBtn.style.display = 'none'; hintBtn.style.display = 'none'; desmosBtn.style.display = 'none'; nextBtn.style.display = 'none'; feedbackBox.style.display = 'none';
    }

    // Initialize
    window.onload = startNewRound;
</script>

</body>
</html>
